<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Crear Foro</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .form-box { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: var(--shadow); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
    </style>
</head>
<body>
<div class="form-box">
    <header style="margin-bottom: 20px;">
        <a href="/foros" style="text-decoration: none; color: var(--text-muted); font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Volver</a>
        <h2 style="margin-top: 10px;">Crear Nuevo Foro</h2>
    </header>

    <form th:action="@{/foros/guardar}" th:object="${foro}" method="post">
        <div class="form-group">
            <label>Título del Foro</label>
            <input type="text" th:field="*{titulo}" placeholder="Ej. ¿Cómo mejorar la seguridad en eventos?" required>
        </div>
        <div class="form-group">
            <label>Descripción / Tema inicial</label>
            <textarea th:field="*{descripcion}" rows="5" placeholder="Escribe de qué trata este foro..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">Publicar Foro</button>
    </form>
</div>
</body>
</html>
